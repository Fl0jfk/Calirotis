# Amplify Hosting : les variables définies dans la console sont disponibles ici en preBuild.
# On les recopie dans .env.production.local pour que Next les charge pendant `next build`
# (sinon le runtime SSR peut ne pas voir BUCKET_NAME / les clés AWS → CredentialsProviderError).
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - node scripts/write-amplify-env.cjs
        - npm ci
    build:
      commands:
        - npm run build
        - test -f .env.production.local && cp .env.production.local .next/.env.production.local || true
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
